steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/PROJECT_ID/IMAGE_NAME:latest', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/PROJECT_ID/IMAGE_NAME:latest']

  - name: 'gcr.io/cloud-builders/gcloud'
    args: ['run', 'deploy', 'SERVICE_NAME', '--image', 'gcr.io/PROJECT_ID/IMAGE_NAME:latest', '--platform', 'managed', '--region', 'us-central1']

# Replace PROJECT_ID, IMAGE_NAME, and SERVICE_NAME with your own values.
# For example, if your project ID is my-project, the image name is my-image, and the service name is my-service.